project:
  type: website
  output-dir: _site
  resources:
    - "images/**"
    - "videos/**"

website:
  title: "{{PROJECT_TITLE}}"
  description: "Live research log built by c3r agents"
  navbar:
    background: dark
    search: true
    left:
      - href: index.qmd
        text: Overview
      - text: Agents
        menu:
          # c3r populates this list when running `c3r report build` —
          # one entry per active agent's report page
          - href: agents/index.qmd
            text: All agents
      - href: experiments.qmd
        text: Experiments
      - href: references.qmd
        text: References
    right:
      - icon: github
        href: "{{REPO_URL}}"
        aria-label: GitHub repo

  page-footer:
    left: "Generated by [c3r](https://github.com/DJRGVC/c3r) · agent-maintained"
    right: "Powered by [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-copy: true
    fig-cap-location: bottom
    tbl-cap-location: top
    smooth-scroll: true
    anchor-sections: true
    highlight-style: github
    link-external-icon: true
    link-external-newwindow: true
